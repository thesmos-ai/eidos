version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  allow-parallel-runners: true
  tests: true
  go: "1.26"
  relative-path-mode: gomod

output:
  show-stats: true
  path-mode: "abs"
  sort-order:
    - linter
    - severity
    - file

linters:
  default: none
  enable:
    # Bugs & safety
    - copyloopvar
    - errcheck
    - errorlint
    - exhaustive
    - gosec
    - govet
    - nilerr
    - predeclared
    - staticcheck
    - unused
    - wastedassign
    # Modernization / BC
    - modernize
    - unparam
    # Performance
    - bodyclose
    - gocritic
    - noctx
    - perfsprint
    - prealloc
    # Architecture & style
    - decorder
    - depguard
    - dupword
    - forbidigo
    - interfacebloat
    - misspell
    - revive
    - wrapcheck
    - musttag
    - sloglint
    - usestdlibvars
    - nilnil
    - goconst
    # Concurrency
    - asasalint
    - containedctx
    - contextcheck
    - errname
    - fatcontext
    - spancheck
    - whitespace
    # Test hygiene
    - testifylint
    - thelper
    - tparallel
    - paralleltest
    - usetesting

  settings:
    decorder:
      disable-dec-order-check: true
      disable-init-func-first-check: false

    # Layering enforcement. Files matched by no rule are unrestricted —
    # cmd/, cli/, config/, testpipe/ live at the binary / library /
    # harness edges and pull in third-party deps as needed.
    depguard:
      rules:
        # node/ and emit/ are the language-agnostic data-model layer.
        # They may import each other, general-purpose stdlib, and any
        # foundation primitive under core/ — never anything
        # language-specific (go/ast, go/types, go/format, text/template)
        # and no frontend or backend.
        agnostic:
          list-mode: strict
          files:
            - "**/node/**"
            - "**/emit/**"
          allow:
            - $gostd
            - go.thesmos.sh/eidos/node
            - go.thesmos.sh/eidos/emit
            - go.thesmos.sh/eidos/core/
            - github.com/google/go-cmp
          deny:
            - pkg: go/ast
              desc: "language-specific stdlib belongs in frontend/<lang>/"
            - pkg: go/types
              desc: "language-specific stdlib belongs in frontend/<lang>/"
            - pkg: go/parser
              desc: "language-specific stdlib belongs in frontend/<lang>/"
            - pkg: go/token
              desc: "language-specific stdlib belongs in frontend/<lang>/"
            - pkg: go/format
              desc: "go/format belongs in backend/<lang>/"
            - pkg: text/template
              desc: "templating belongs in backend/<lang>/"

        # core/* (position, naming, diag, meta, store, plugin, pipeline,
        # sink, cache): imports the agnostic packages and other core/*
        # packages only; never a specific frontend or backend.
        # The trailing slash on go.thesmos.sh/eidos/core/ makes it a
        # prefix pattern that matches any core subpackage.
        core:
          list-mode: strict
          files:
            - "**/core/**"
          allow:
            - $gostd
            - go.thesmos.sh/eidos/node
            - go.thesmos.sh/eidos/emit
            - go.thesmos.sh/eidos/core/
            - github.com/google/go-cmp

        # plugins/ consume meta keys (set by frontends) and ship their
        # own templates (rendered by the backend). They must not depend
        # on a specific frontend or backend.
        plugins:
          list-mode: lax
          files:
            - "**/plugins/**"
          deny:
            - pkg: go.thesmos.sh/eidos/frontend
              desc: "plugins must not depend on a specific frontend; read facts via meta keys"
            - pkg: go.thesmos.sh/eidos/backend
              desc: "plugins must not depend on a specific backend; ship templates instead"

        # Frontends never import other frontends or any backend.
        frontends:
          list-mode: lax
          files:
            - "**/frontend/**"
          deny:
            - pkg: go.thesmos.sh/eidos/backend
              desc: "frontends and backends must not import each other"

        # Backends never import other backends or any frontend.
        backends:
          list-mode: lax
          files:
            - "**/backend/**"
          deny:
            - pkg: go.thesmos.sh/eidos/frontend
              desc: "frontends and backends must not import each other"

    forbidigo:
      analyze-types: true
      forbid:
        - pattern: ^panic$
          msg: "panic() is forbidden in library code; return errors explicitly."

    exhaustive:
      default-signifies-exhaustive: true
      check:
        - switch

    usetesting:
      context-background: true
      context-todo: true
      os-setenv: true
      os-mkdir-temp: true
      os-temp-dir: true

    gocritic:
      enabled-tags:
        - performance
        - diagnostic
      disabled-checks:
        - ifElseChain
        - commentedOutCode
        - hugeParam
      settings:
        rangeValCopy:
          sizeThreshold: 256

    wrapcheck:
      ignore-sig-regexps:
        - \.New.*Error\(
        - \.(Wrap|Wrapf)\(
        - errors\.(Join|Unwrap)\(
        - \.Err\(
      ignore-package-globs:
        - go.thesmos.sh/eidos/*

    staticcheck:
      checks:
        - all
        - "-SA1016"
        - "-S1016"

    revive:
      severity: error
      confidence: 0.1
      rules:
        - name: context-as-argument
        - name: var-naming
        - name: package-comments
        - name: receiver-naming
        - name: exported
          severity: warning
        - name: error-return
        - name: error-naming
        - name: error-strings
        - name: errorf
        - name: if-return
        - name: indent-error-flow
        - name: early-return
        - name: unexported-return
        - name: redundant-import-alias
        - name: range
        - name: empty-block
        - name: unnecessary-stmt
        - name: modifies-value-receiver
        - name: time-naming
        - name: unused-receiver

    govet:
      enable-all: true

    interfacebloat:
      max: 10

    asasalint:
      use-builtin-exclusions: true

    copyloopvar:
      check-alias: true

    whitespace:
      multi-if: true
      multi-func: false

  exclusions:
    generated: lax
    paths:
      - docs
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      # Test functions are naturally large (table-driven, setup,
      # multi-phase scenarios). Complexity and constant linters add noise.
      - path: '_test\.go'
        linters: [gocognit, maintidx, cyclop, funlen, goconst]

      # Test helpers and test files may use panic() for unreachable
      # guards, return (nil, nil) from stubs, and have apparently-
      # unused params (table-driven scaffolding).
      - path: '(_test\.go|eidostest/pipelinetest/)'
        linters: [forbidigo, nilnil, unparam]

      # fieldalignment is noise for non-hot-path structs.
      - linters: [govet]
        text: "fieldalignment:"

      # G115: integer overflow on conversion.
      - linters: [gosec]
        text: "G115:"

      # cli/ implements CLI commands and cmd/eidos/ is the binary entry
      # point — both legitimately call fmt.* for stdout/stderr output
      # to the user, which structured logging would not replace.
      - path: "(cli/|cmd/eidos/)"
        linters: [forbidigo]

      # pipelinetest runs full pipelines that share a working directory
      # and golden files; tests cannot always be parallelized.
      - path: "pipelinetest/"
        linters: [paralleltest]

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    - golines

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(go.thesmos.sh/eidos)
      custom-order: true
    golines:
      max-len: 120
    gofumpt:
      extra-rules: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  fix: false

severity:
  default: error
