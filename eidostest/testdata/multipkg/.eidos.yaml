version: 1

# multipkg fixture configuration. Routes:
#   - mockgen runs with defaults: every mock lands in a
#     `<srcPkg>_test` emit.Package, rendered as `<src>_mock_test.go`
#     next to the source — the Go toolchain compiles the file only
#     at test time and the external test-package import identity
#     keeps same-package elision inert. Users wanting a different
#     destination drive it through the routing surface
#     (`+gen:out:mockgen <path> pkg=…` on the source, or `-o` / `-p`
#     on the CLI).
#   - repogen + builder + registrygen run with defaults
#     (alongside-source layout, log.Print fallbacks).
#   - audit-weaver / debug-weaver run with stdlib log fallbacks.
sources:
  - frontend: golang
    patterns:
      - ./domain
      - ./storage
      - ./events
      - ./legacy/events
      - ./api
      - ./internal/codec

plugins:
  - name: golang
  - name: backend.golang
  - name: repogen
  - name: builder
  - name: mockgen
  - name: registry-gen
  - name: audit-weaver
  - name: debug-weaver
  - name: shape-writer
