syntax = "proto3";

package eidos.test.buildfixture.extras;

option go_package = "go.thesmos.sh/eidos/eidostest/protopipe/buildfixture/extras;extras";

// Tag is the cross-package fixture message. buildfixture.proto
// imports this file and references Tag on the User message so
// the rendered Go output exercises the bridge's cross-package
// proto-qualifier → Go-import translation against a non-
// well-known reference.
message Tag {
  string name = 1;
}
