syntax = "proto3";

package eidos.test.buildfixture;

option go_package = "go.thesmos.sh/eidos/eidostest/protopipe/buildfixture;buildfixture";

import "google/protobuf/timestamp.proto";
import "extras/extras.proto";

// Status enumerates the User lifecycle states. It exercises the
// proto3 enum surface (variants in declaration order, default
// value at tag 0) plus the bridge's value-typed enum reference
// path on User.state.
enum Status {
  STATUS_UNKNOWN = 0;
  STATUS_ACTIVE = 1;
  STATUS_BANNED = 2;
}

// User exercises the bridge's full composition surface end-to-
// end: a well-known reference (created_at), an optional field
// (age), a nested-message reference (profile_ref), an enum
// reference (state), and a cross-package message reference
// (extras_tag). Field identifiers follow the proto snake_case
// convention so reference plugins exercise their bridge-stamped
// go.name awareness against realistic source.
//
// +gen:builder
// +gen:repo
// +gen:register
// +gen:writer
message User {
  string name = 1;
  optional int32 age = 2;
  google.protobuf.Timestamp created_at = 3;
  Profile profile_ref = 4;
  Status state = 5;
  eidos.test.buildfixture.extras.Tag extras_tag = 6;

  // Profile is the nested message referenced via the
  // profile_ref field above. The rendered Go output uses the
  // underscore-joined form `User_Profile` per the bridge's
  // nested-name convention.
  message Profile {
    string bio = 1;
  }
}

// GetUserRequest carries the lookup key for the canonical
// unary RPC the fixture exposes.
message GetUserRequest {
  string id = 1;
}

// Container exercises the proto3 oneof surface. The frontend
// synthesises `Container_choice` as the host interface; explain
// follows each variant field (text_value, numeric_value) back to
// it via the documented `proto.oneof.interface` meta. The
// message carries no `+gen:` directives so reference plugins
// emit nothing for it — its sole purpose is providing an
// oneof-variant target for the explain coverage test.
message Container {
  oneof choice {
    string text_value = 1;
    int32 numeric_value = 2;
  }
}

// UserService is the proto-service fixture covering the
// mockgen path: a single unary RPC whose request and response
// types live in this same package. The rendered mock files
// land alongside the source, so the toolchain compile check
// confirms mockgen's proto-input output is buildable.
//
// +gen:mock
service UserService {
  rpc GetUser(GetUserRequest) returns (User);
}
