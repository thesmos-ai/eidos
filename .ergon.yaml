# ergon configuration for eidos.
#
# Values not declared here fall back to ergon's per-subsystem
# defaults. Inline comments document why each non-default value
# was chosen so reviewers can challenge or extend the policy.

# Project identity — used in help banners and as the directory
# name for cached artifacts (.eidos/, .coverage/, …).
name: eidos

# Module set discovered via go.work — ergon's auto-detection
# covers the eight-module split (root + backend/golang +
# bridge/protogo + cli + eidostest + frontend/{golang,protobuf} +
# reference) without hand-listing.
modules: []

# bootstrap — `ergon bootstrap`
bootstrap:
  extra_tools: []

# license — `ergon license` (apply) and `ergon lint license` (verify)
license:
  config_file: .go-license.yml
  # docs/superpowers is the internal-only working state per the
  # project's documented contributor rule ("never commit, never
  # reference"). .gitignore drops it; listing it here keeps
  # `ergon license` from walking a path that may exist on a
  # contributor's checkout from an earlier state.
  exclude_dirs:
    - .git
    - vendor
    - dist
    - node_modules
    - docs/superpowers
  exclude_files:
    - "*.gen.go"
    - "*.gen_test.go"

# markdown — markdownlint-cli2 invocation shared by `ergon fmt`
# (auto-fix) and `ergon lint md` (reporting only)
markdown:
  globs:
    - "**/*.md"
    - "#vendor"
    - "#dist"
    - "#node_modules"
    # Same rationale as the license exclusion above.
    - "#docs/superpowers"

# test — `ergon test` and its subcommands. Defaults preserved:
# count=3 catches flake, timeout=10m covers the full
# reference-acceptance pass, fuzz_time=30s bounds CI without
# preventing deeper local runs (bump via FUZZ_TIME=5m).
test:
  cpu: 4
  count: 3
  timeout: 10m
  race_count: 3
  bench_count: 6
  fuzz_time: 30s

# bench — `ergon bench baseline` / `regression`
bench:
  baseline_path: bench/baseline.txt
  thresholds:
    # 5% time-significant deltas hard-fail; benchstat-reported
    # insignificant (`~`) shifts never gate.
    time_percent: 5
    # B/op is advisory only; struct-padding shifts the metric
    # under unrelated refactors. 10% keeps warnings useful.
    bytes_percent: 10
    # Allocations/op is a contract: any positive change is a
    # regression. 0% means an explicit baseline bump is required
    # to grow the allocation count.
    allocs_percent: 0

# release — `ergon release`. Empty list = inherit the global module
# set from go.work for releases.
release:
  modules: []

# checks — `ergon check` umbrella
checks:
  # Path globs both coverage AND mutation ignore. The reasons are
  # human-facing so reviewers can challenge new excludes on PR.
  excludes:
    - path: "**/testdata/**"
      reason: |
        Test inputs, not subjects of coverage. Frameworks load
        these via packages.Load / protocompile; the files are
        fixtures, not production code.
    - path: "**/buildfixture/**"
      reason: |
        Go-buildable proto-bridge fixture inside the protopipe
        harness. Input to the toolchain compile check, not a
        subject of coverage.
    - path: "pluginfixture/**"
      reason: |
        Sample Go types loaded as fixture input by tests in
        downstream modules. No logic to test; 0% is correct.
    - path: "eidostest/**"
      reason: |
        Cross-module integration test harness. Its tests cover
        framework modules (via demopipe / protopipe / integration
        suites), not itself.
    - path: "bridge/protogo/**"
      reason: |
        Bridge annotator is exercised end-to-end by
        eidostest/integration/protogo/. Local coverage looks low
        because the suite that exercises it lives downstream;
        exclude until cross-module coverage merging exists.
    - path: "reference/**"
      reason: |
        Reference plugin behavior is gated by
        eidostest/integration/<plugin>/. Same cross-module
        coverage limitation as bridge/protogo.
    - path: "**/*.gen.go"
      reason: generated code; the generator's own tests cover it.
    - path: "**/*.gen_test.go"
      reason: generated test code; same.

  # Structural skip rules: function name + file pattern. Applied
  # to coverage AND mutation. Reserved for genuinely
  # untestable-by-design surfaces.
  skips:
    - label: interface-marker
      func_glob: isRef
      file_glob: "**/*_ref.go"
      # Interface-marker methods on emit.Ref variants. They exist
      # to satisfy the Ref interface and never have a callable
      # path — 0% coverage is by design.

  # coverage — `ergon check coverage`
  #
  # Single global threshold (no per-layer customization), per the
  # project policy. Excludes above remove the cross-module-tested
  # surfaces from the gate; the remaining code is what local tests
  # are responsible for covering. 70% is the floor today's tree
  # clears with the excludes in place — a guard against
  # regression, not an aspirational target. Tighten when the
  # remaining 0%-coverage functions earn dedicated tests, OR when
  # ergon learns to merge coverage across workspace modules
  # (at which point the excludes can shrink and the threshold can
  # climb).
  coverage:
    packages:
      - path: "./..."
        line: 70
        branch: 0
        require_branch: false
    top_n: 10

  mutation:
    # Mutation testing not yet wired into the project's gate.
    # Empty list short-circuits the check. Enable per-layer when
    # the mutation-testing story matures.
    packages: []
    gremlins:
      workers: 2
      test_cpu: 2
      timeout_coefficient: 30

  # error-prefix — `ergon check error-prefix`
  #
  # Convention: every errors.New / fmt.Errorf sentinel begins with
  # "<pkg-name>: " where <pkg-name> matches the `package` clause
  # of the declaring file. Avoids the "two packages, same generic
  # error string" debugging trap in multi-module repos.
  error_prefix:
    target_dirs: ["."]

  # commit-msg — `ergon check commit-msg <file>`
  #
  # Type list matches the project's conventional-commit usage in
  # `git log`. 80-byte subject ceiling (default 72) accommodates
  # the project's existing scoped subjects without rephrasing.
  commit_msg:
    types:
      - feat
      - fix
      - docs
      - refactor
      - test
      - ci
      - chore
      - perf
      - build
      - revert
    max_subject_length: 80
