# ergon configuration for eidos.
#
# Values not declared here fall back to ergon's per-subsystem
# defaults. Inline comments document why each non-default value
# was chosen so reviewers can challenge or extend the policy.

name: eidos

# Module set discovered via go.work — ergon's auto-detection covers
# the eight-module split (root + backend/golang + bridge/protogo +
# cli + eidostest + frontend/{golang,protobuf} + reference) without
# hand-listing.
modules: []

# bootstrap — `ergon bootstrap`
bootstrap:
  extra_tools: []

# license — `ergon license` (apply) and `ergon lint license` (verify)
license:
  config_file: .go-license.yml
  # docs/superpowers is the internal-only working state per the
  # project's documented contributor rule ("never commit, never
  # reference"). .gitignore already drops it, but listing it here
  # keeps `ergon license` from walking a path that may exist on a
  # contributor's checkout from an earlier state.
  exclude_dirs:
    - .git
    - vendor
    - dist
    - node_modules
    - docs/superpowers
  exclude_files:
    - "*.gen.go"
    - "*.gen_test.go"

# markdown — markdownlint-cli2 invocation shared by `ergon fmt` and
# `ergon lint md`
markdown:
  globs:
    - "**/*.md"
    - "#vendor"
    - "#dist"
    - "#node_modules"
    # Same rationale as the license exclusion: docs/superpowers is
    # internal-only and intentionally not committed; skip it from
    # markdownlint so the gate stays green on contributor checkouts
    # that retain it.
    - "#docs/superpowers"

# test — `ergon test` and its subcommands
#
# Defaults preserved: count=3 (catches flake), timeout=10m (long
# enough for the full reference-acceptance pass), fuzz_time=30s
# (bounded CI run; bump locally with FUZZ_TIME=5m).
test:
  cpu: 4
  count: 3
  timeout: 10m
  race_count: 3
  bench_count: 6
  fuzz_time: 30s

# bench — `ergon bench baseline` / `regression`
bench:
  baseline_path: bench/baseline.txt
  thresholds:
    # 5% time regressions on significant deltas fail; insignificant
    # benchstat-reported (~) shifts never gate. Tight enough to
    # catch the kind of accidental complexity bumps a code review
    # would otherwise miss.
    time_percent: 5
    # B/op is advisory only; struct-padding rearrangements shift
    # this metric under unrelated refactors. 10% headroom keeps
    # the warning from firing on every PR.
    bytes_percent: 10
    # Allocations/op is a contract — any positive change is a
    # regression, period. 0% threshold means: don't grow alloc
    # count without an explicit baseline bump.
    allocs_percent: 0

# checks — `ergon check` umbrella
checks:
  # File-level exclusions applied to coverage AND mutation. Paths
  # are repository-relative globs.
  excludes:
    - path: "**/testdata/**"
      reason: |
        Test inputs, not subjects of coverage. The frameworks load
        these under packages.Load / protocompile; the files are
        fixtures, not production code.
    - path: "pluginfixture/**"
      reason: |
        Sample Go types loaded as fixture input by tests in
        downstream modules. Carries no logic to test directly;
        coverage of zero is correct.
    - path: "eidostest/**"
      reason: |
        Cross-module integration test harness. Its tests cover the
        framework modules (via demopipe / protopipe / integration
        suites), not itself; gating eidostest's own coverage would
        gate the wrong thing.
    - path: "**/buildfixture/**"
      reason: |
        Go-buildable proto-bridge fixture inside the protopipe
        harness. Same rationale as pluginfixture — input to a
        toolchain compile check, not subject to coverage.
    - path: "**/*.gen.go"
      reason: generated code; covered by the generator's own tests.
    - path: "**/*.gen_test.go"
      reason: generated test code; same.

  skips: []

  # coverage — `ergon check coverage`
  #
  # Coverage is measured per-module. Reference plugins and the
  # protogo bridge are exercised primarily by integration tests
  # that live in eidostest/integration/<plugin>/ (per the
  # multi-module split that broke the test ↔ harness cycle); their
  # local coverage looks low because most of their tests moved
  # downstream. Until cross-module coverage merging lands, those
  # paths gate at a lower floor.
  coverage:
    # Coverage gating is intentionally disabled — leave packages
    # empty so `ergon check coverage` short-circuits with a notice.
    #
    # Background: ergon's gate is per-function-per-module. The
    # multi-module split relocated cross-cutting integration tests
    # into eidostest/integration/ to break the test ↔ harness
    # cycle. Those tests exercise plenty of functions in
    # bridge/protogo, reference/*, and the cross-module surface
    # of backend/golang and frontend/protobuf — but the per-module
    # coverage measurement doesn't see them, so the gate would
    # fire on real-but-cross-module-tested code.
    #
    # Re-enable when one of the following lands:
    #   - ergon learns to merge coverage across workspace modules
    #   - a separate eidostest-driven coverage pass produces a
    #     unified report
    #
    # Starter set of per-package thresholds, populated below as
    # YAML comments. When re-enabling the gate, uncomment and
    # tune to the post-merge reality.
    #
    # packages:
    #   - { path: cache/...,            line: 90 }
    #   - { path: core/...,             line: 95 }
    #   - { path: emit/...,             line: 80 }  # isRef markers 0% by design
    #   - { path: manifest/...,         line: 95 }
    #   - { path: node/...,             line: 95 }
    #   - { path: pipeline/...,         line: 85 }
    #   - { path: plugin/...,           line: 95 }
    #   - { path: sink/...,             line: 85 }
    #   - { path: store/...,            line: 95 }
    #   - { path: writer/...,           line: 85 }
    #   - { path: docaudit/...,         line: 65 }
    #   - { path: storefixture/...,     line: 90 }
    #   - { path: testpipe/...,         line: 90 }
    #   - { path: backend/golang/...,   line: 50 }  # bridge helpers exercised cross-module
    #   - { path: frontend/golang/...,  line: 75 }
    #   - { path: frontend/protobuf/..., line: 75 }
    #   - { path: bridge/protogo/...,   line: 20 }  # mostly cross-module
    #   - { path: cli/...,              line: 60 }
    #   - { path: reference/...,        line: 0  }  # all tests in eidostest/integration/
    packages: []
    top_n: 10

  mutation:
    # Mutation testing not yet wired into the project's gate. Empty
    # list short-circuits the check; enable per-layer when the
    # mutation-testing story is ready.
    packages: []
    gremlins:
      workers: 2
      test_cpu: 2
      timeout_coefficient: 30

  # error-prefix — `ergon check error-prefix`
  #
  # Convention: every errors.New / fmt.Errorf sentinel begins with
  # "<pkg-name>: " where <pkg-name> matches the `package` clause of
  # the declaring file. Avoids the "two packages, same generic
  # error string" debugging trap that comes up in multi-module
  # repos where many packages declare an `Err…` of the same shape.
  error_prefix:
    target_dirs: ["."]

  # commit-msg — `ergon check commit-msg <file>`
  #
  # Type list matches the project's conventional-commit usage as
  # seen in `git log`: feat / fix / test / docs / refactor / chore
  # are common; perf / build / ci / revert are reserved for the
  # cases they describe. No type for "release"; the release tool
  # uses chore.
  commit_msg:
    types:
      - feat
      - fix
      - docs
      - refactor
      - test
      - ci
      - chore
      - perf
      - build
      - revert
    # 80-byte ceiling instead of the default 72: several existing
    # commit subjects in the eidos history are 73–78 bytes
    # ("feat(frontend/protobuf): messages, enums, scalar fields +
    # per-construct meta") and reflect real scope rather than
    # verbose phrasing. 80 keeps subjects compatible with terminal
    # widths while accommodating the scoped-prefix style.
    max_subject_length: 80
