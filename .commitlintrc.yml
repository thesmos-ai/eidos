# Commit-lint configuration for testkit.
#
# Used by:
#   - .github/workflows/commitlint.yml (CI gate)
#   - local pre-commit hook (commit-msg stage)
#
# To run locally:
#   npx --yes @commitlint/cli@latest --extends @commitlint/config-conventional --from=origin/main

extends:
  - "@commitlint/config-conventional"

rules:
  # Allowed types
  type-enum:
    - 2 # error
    - always
    - - feat
      - fix
      - refactor
      - perf
      - docs
      - test
      - build
      - ci
      - chore
      - revert

  # Subject line limits
  header-max-length: [2, always, 72]
  subject-empty: [2, never]
  subject-full-stop: [2, never, "."]

  # Disable case enforcement — allows proper nouns and acronyms.
  subject-case: [0]

  # Body and footer discipline
  body-leading-blank: [2, always]
  footer-leading-blank: [2, always]
  body-max-line-length: [2, always, 100]
